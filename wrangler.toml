name = "oshicardapi"
main = "src/index.ts"
compatibility_date = "2025-04-01"

# Dev (default) — oshicardapi.luisrvervaet.workers.dev
[[d1_databases]]
binding = "DB"
database_name = "oshicard-db"
database_id = "cffd06e0-0a83-466e-bc21-5a3c166e7dca"

# Prod — api.oshi.cards
[env.production]
routes = [{ pattern = "api.oshi.cards", custom_domain = true }]

[[env.production.d1_databases]]
binding = "DB"
database_name = "oshicard-db-prod"
database_id = "86594e06-89d8-4b10-8a97-13053104a3c4"
